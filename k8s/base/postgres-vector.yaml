apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-postgres
  namespace: sre-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-postgres
  template:
    metadata:
      labels:
        app: sre-postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "sre_platform"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: sre-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sre-postgres
  namespace: sre-platform
spec:
  selector:
    app: sre-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
