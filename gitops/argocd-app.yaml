apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/autonomous-ai-sre'
    path: k8s/base
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: sre-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
