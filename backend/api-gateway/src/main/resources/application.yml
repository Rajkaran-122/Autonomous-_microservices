server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true  # Java 21 Virtual Threads

  # ==================== DATABASE ====================
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:sre_platform}
    username: ${POSTGRES_USER:sre_admin}
    password: ${POSTGRES_PASSWORD:sre_secret_2024}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  # ==================== REDIS ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

  # ==================== KAFKA ====================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: api-gateway-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ai.sre.common.event

  # ==================== JACKSON ====================
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ==================== SECURITY ====================
sre:
  security:
    jwt:
      secret: ${JWT_SECRET:default-secret-key-change-in-production-must-be-at-least-256-bits-long}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      issuer: ai-sre-platform

# ==================== ACTUATOR ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# ==================== LOGGING ====================
logging:
  level:
    com.ai.sre: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
