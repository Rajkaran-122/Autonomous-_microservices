server:
  port: 8083

spring:
  application:
    name: ai-engine
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:sre_platform}
    username: ${POSTGRES_USER:sre_admin}
    password: ${POSTGRES_PASSWORD:sre_secret_2024}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ai-engine-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ai.sre.common.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
      model-name: ${OPENAI_MODEL:gpt-4o}
      temperature: ${OPENAI_TEMPERATURE:0.1}
      max-tokens: ${OPENAI_MAX_TOKENS:2000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.ai.sre: DEBUG
    dev.langchain4j: INFO
